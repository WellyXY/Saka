<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yiumo Creator Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        /* Navigation */
        .nav {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            padding: 8px;
            background: #141414;
            border-radius: 12px;
            border: 1px solid #222;
        }
        .nav-btn {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-btn:hover { color: #fff; background: #1a1a1a; }
        .nav-btn.active { color: #fff; background: #ff6b9d; }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 32px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            border-radius: 20px;
            margin-bottom: 24px;
            border: 1px solid #222;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ff6b9d;
            object-fit: cover;
        }
        .profile-info h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .profile-info .username { color: #888; font-size: 14px; margin-bottom: 4px; }
        .profile-info .bio { color: #aaa; font-size: 13px; }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); border-color: #ff6b9d; }
        .stat-card .value { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
        .stat-card .label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title { font-size: 20px; font-weight: 600; }
        .section-subtitle { font-size: 13px; color: #666; }
        .update-badge { font-size: 12px; color: #ff6b9d; }

        /* Posts Grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .post-card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .post-card:hover { transform: translateY(-4px); border-color: #333; }
        .post-card .thumbnail {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
            background: #1a1a1a;
        }
        .post-card .info { padding: 14px; }
        .post-card .engagement {
            display: flex;
            gap: 12px;
            margin-bottom: 6px;
        }
        .post-card .engagement span {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #888;
        }
        .post-card .caption {
            font-size: 12px;
            color: #aaa;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .post-card .type-badge {
            display: inline-block;
            font-size: 10px;
            padding: 3px 8px;
            background: rgba(255,107,157,0.15);
            color: #ff6b9d;
            border-radius: 4px;
            margin-bottom: 6px;
        }

        /* History Table */
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        .history-table th {
            text-align: left;
            padding: 12px 16px;
            background: #141414;
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #222;
        }
        .history-table td {
            padding: 16px;
            border-bottom: 1px solid #1a1a1a;
            font-size: 13px;
            vertical-align: middle;
        }
        .history-table tr:hover { background: #111; }
        .history-thumb {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            background: #222;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .status-queued { background: rgba(255,193,7,0.15); color: #ffc107; }
        .status-processing { background: rgba(33,150,243,0.15); color: #2196f3; }
        .status-completed { background: rgba(76,175,80,0.15); color: #4caf50; }
        .status-failed { background: rgba(244,67,54,0.15); color: #f44336; }
        .status-published { background: rgba(156,39,176,0.15); color: #9c27b0; }

        /* Filters */
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .filter-btn {
            padding: 8px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            color: #fff;
            border-color: #ff6b9d;
            background: rgba(255,107,157,0.1);
        }

        /* Inspiration Cards */
        .inspiration-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .inspiration-card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.2s;
        }
        .inspiration-card:hover { transform: translateY(-2px); border-color: #333; }
        .inspiration-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .inspiration-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #333;
        }
        .inspiration-name { font-weight: 600; font-size: 14px; }
        .inspiration-handle { color: #888; font-size: 12px; }
        .inspiration-stats {
            display: flex;
            gap: 16px;
            color: #666;
            font-size: 12px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state h3 { margin-bottom: 8px; color: #888; }

        /* Page sections */
        .page { display: none; }
        .page.active { display: block; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal img { max-width: 90%; max-height: 90%; border-radius: 12px; }
        .modal-close {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 32px;
            color: #fff;
            cursor: pointer;
            opacity: 0.7;
        }
        .modal-close:hover { opacity: 1; }

        /* Source link */
        .source-link {
            color: #ff6b9d;
            text-decoration: none;
            font-size: 12px;
        }
        .source-link:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; text-align: center; padding: 20px; }
            .avatar { width: 80px; height: 80px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-card { padding: 16px; }
            .stat-card .value { font-size: 24px; }
            .posts-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .nav { flex-wrap: wrap; }
            .nav-btn { padding: 10px 16px; font-size: 13px; }
            .history-table { font-size: 12px; }
            .history-table th, .history-table td { padding: 10px 8px; }
            .history-thumb { width: 40px; height: 40px; }
        }
    </style>
</head>

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            event.target.classList.add('active');

        function renderPosts() {
            document.getElementById('posts-container').innerHTML = posts.map(post => `
                <div class="post-card">
                    <img src="${post.image}" alt="Post" class="thumbnail" onclick="openModal('${post.image}')" onerror="this.style.background='#222'">
                    <div class="info">
                        <span class="type-badge">${post.type}${post.pinned ? ' • Pinned' : ''}</span>
                        <div class="engagement">

                            <span>💬 ${formatNumber(post.comments)}</span>
                        </div>
                        <p class="caption">${post.caption}</p>
                    </div>
                </div>
            `).join('');
        }

        function filterHistory(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderHistory();
        }

        function renderHistory() {
            const filtered = currentFilter === 'all'
                ? contentHistory.tasks
                : contentHistory.tasks.filter(t => t.type === currentFilter);

            if (filtered.length === 0) {
                document.getElementById('history-tbody').innerHTML = `
                    <tr><td colspan="5" class="empty-state">
                        <h3>No content yet</h3>
                        <p>Generated content will appear here</p>
                    </td></tr>
                `;
                return;
            }

            document.getElementById('history-tbody').innerHTML = filtered.map(task => `
                <tr>
                    <td>
                        <img src="${task.output?.thumbnail || 'images/placeholder.jpg'}" class="history-thumb" onclick="openModal('${task.output?.thumbnail}')" onerror="this.style.background='#333'">

                    <td>${task.type}</td>
                    <td><span class="status-badge status-${task.status}">${task.status}</span></td>

                            ${task.input.url ? `<a href="${task.input.url}" target="_blank" class="source-link">View ref</a>` : ''}
                        ` : '-'}
                    </td>
                    <td>${formatDate(task.created_at)}</td>
                </tr>
            `).join('');
        }

                    <div class="inspiration-header">
                        <div class="inspiration-avatar"></div>
                        <div>
                            <div class="inspiration-name">${acc.username}</div>
                            <div class="inspiration-handle">${acc.platform}</div>
                        </div>
                    </div>
                    <p style="color:#888;font-size:13px;">${acc.notes || ''}</p>
                </div>
            `).join('');
        }

        function openModal(src) {
            if (!src) return;
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('modal').addEventListener('click', e => {
            if (e.target.id === 'modal') closeModal();
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });

        // Initialize
        renderPosts();
        renderHistory();
        renderInspiration();
    </script>
</body>
</html>
